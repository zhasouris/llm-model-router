# Server configuration (non-secret). Secrets come from .env — see .env.example.
# Validated at startup by src/config.ts (fails fast on misconfiguration).

# Default routing strategy when the caller sends no X-Router-Strategy header.
default_strategy: balanced

auth:
  # When false, the proxy accepts unauthenticated requests (local dev only).
  # When true, clients must present a bearer token listed in ROUTER_API_KEYS.
  enabled: true

classifier:
  # The pinned classifier model that produces subjective/predictive features
  # (complexity, expected output, reasoning depth, task type, data sensitivity).
  # Not hardcoded — configured here (ADR 0003 / 0004).
  enabled: true
  provider: openai
  model: gpt-4.1-nano
  timeout_seconds: 8
  # Prompt text is truncated to this many characters before being sent to the
  # classifier, to bound its cost/latency.
  max_input_chars: 8000

# The /demo decision-inspector page and /v1/router/explain endpoint. The demo
# needs the classifier key (CLASSIFIER_API_KEY) to show real signals. Turn off
# in production if you don't want the inspector exposed.
demo:
  enabled: true

# RouteLLM sidecar (ADR 0006). When enabled, the demo shows RouteLLM's win-rate
# alongside the classifier signal (shadow comparison). Requires the Python
# sidecar running at `url` (see sidecar/README.md). URL can be overridden with
# the ROUTELLM_URL env var.
routellm:
  enabled: false
  url: http://localhost:8001

providers:
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
  anthropic:
    # Native Anthropic Messages API via the `anthropic` transformer (ADR 0001):
    # base_url + /messages. Set adapter back to `openai` to use Anthropic's
    # OpenAI-compatible endpoint instead.
    base_url: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    adapter: anthropic
  # Additional vendors, all reached via their OpenAI-compatible endpoints (ADR
  # 0001). Set the matching key in .env to actually route to them; models stay
  # in the catalog for inspection either way.
  google:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GOOGLE_API_KEY
  mistral:
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY
  deepseek:
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
  xai:
    base_url: https://api.x.ai/v1
    api_key_env: XAI_API_KEY
  groq:
    base_url: https://api.groq.com/openai/v1
    api_key_env: GROQ_API_KEY
  together:
    base_url: https://api.together.xyz/v1
    api_key_env: TOGETHER_API_KEY
  cohere:
    base_url: https://api.cohere.ai/compatibility/v1
    api_key_env: COHERE_API_KEY

telemetry:
  service_name: llm-model-router
  # Console exporter — handy for local dev (traces, metrics, logs).
  console_export: true
  otlp:
    enabled: false
    endpoint: http://localhost:4318/v1/traces
  # Azure Monitor / Application Insights. Connection string comes from
  # APPLICATIONINSIGHTS_CONNECTION_STRING in .env (see docs/help/observability.md).
  azure_monitor:
    enabled: false
  # Which signals to emit; each goes to whatever backends are enabled above.
  metrics:
    enabled: true
  logs:
    enabled: true
