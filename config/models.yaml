  # --- Google Gemini ---
  # The gemini-2.x ids were retired ("no longer available to new users") and
  # every request to them 404'd while the key authenticated fine — the failure
  # availability checks cannot see. Replaced 2026-07-22 with ids verified
  # callable via /v1/router/providers.
  #
  # Everything below is measured except price: ids, context/output limits,
  # capabilities (vision/tools/structured_output each confirmed with a real
  # call) and avg_latency_ms (mean of 3 samples). The cost figures are CARRIED
  # OVER from the 2.x models they replace and are NOT VERIFIED — check them
  # against Google's pricing page before trusting a cost or balanced decision.
  # A wrong price does not error; it silently misroutes. See docs/TODO.md.
  - id: gemini-3.1-pro-preview
    provider: google
    tier: 5
    context_window: 1048576
