# Model catalog. The single source of truth for candidate models and their
# attributes. Hard-constraint filtering and weighted scoring both read from here
# (ADR 0003). Adding a model is a config edit — no code change.
#
# Cost/context sourced from web research 2026-07-23 (docs/process/model-scores.json);
# some (Gemini, Cohere) are mixed-confidence. NOTE: the `cost_per_1k_*` field names
# are legacy — the values are USD per 1,000,000 tokens. Routing uses cost ratios so
# this is consistent for selection; only the displayed estimatedCost is affected.
#   cost_per_1k_input / cost_per_1k_output : USD per 1,000,000 tokens (see note above)
#   context_window / max_output_tokens     : tokens
#   tier                                    : rough capability rank (higher = stronger)
#   avg_latency_ms                          : seed value; overridden by live OTel later
#   capabilities                            : any of [vision, tools, structured_output, audio, reasoning]
#   api_key_env  (optional)                 : env var holding THIS model's own API key.
#       When set and present, the proxy authenticates this model's calls with that
#       key instead of the provider default — so the vendor's billing dashboard
#       attributes spend per model (ADR 0007). Falls back to the provider key if unset.

models:
  - id: gpt-4.1
    provider: openai
    tier: 4
    context_window: 1047576
    max_output_tokens: 32768
    cost_per_1k_input: 2.00
    cost_per_1k_output: 8.00
    avg_latency_ms: 1200
    capabilities: [vision, tools, structured_output]
    # Example of a per-model key (falls back to OPENAI_API_KEY if this env is unset):
    # api_key_env: OPENAI_API_KEY_GPT_4_1

